name: AI Rural Finance CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install & Build Backend
        run: |
          cd backend
          npm ci
          npm run build

      - name: Install & Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Setup Python & Validate ML Engine
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: |
          cd ai-engine
          pip install -r requirements.txt
